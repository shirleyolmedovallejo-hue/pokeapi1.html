<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Juego Canvas</title>

    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <a href="index.html" class="volver-menu3">
        🏠 Menú Principal
    </a>

    <div id="marioJuegoContenedor">
        <div id="marioJuegoPantallaFinal" style="display:none;">

            <h1>¡Juego Terminado!</h1>

            <button id="marioJuegoBtnReiniciar">
                Jugar de nuevo
            </button>

        </div>

        <div id="marioJuegoPanel">

            <div>
                Puntos:
                <span id="marioJuegoPuntos">0</span>
            </div>

            <div>
                Vidas:
                <span id="marioJuegoVidas">3</span>
            </div>

        </div>

        <button id="marioJuegoBtnInicio">
            Iniciar Juego
        </button>

        <div id="marioJuegoPantallaInicio">

            <img src="img/mario_inicio.jpg" alt="Inicio Mario">

        </div>

        <canvas id="marioJuegoCanvas" width="1200" height="600">
        </canvas>

        <!-- Audios -->

        <audio id="marioJuegoMusica" loop>
            <source src="audio/sonidomario.wav.mp3" type="audio/mpeg">
        </audio>

        <audio id="marioJuegoSalto">
            <source src="audio/salto.wav.mp3" type="audio/wav">
        </audio>

        <audio id="marioJuegoMoneda">
            <source src="audio/moneda.wav.mp3" type="audio/wav">
        </audio>

        <audio id="marioJuegoVictoria">
            <source src="audio/victoriawav.mp3" type="audio/wav">
        </audio>

    </div>

    <script src="mario.js"></script>

</body>

</html>
